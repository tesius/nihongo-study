app = 'nihongo-study'
primary_region = 'nrt'

[build]

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'

[mounts]
  source = 'nihongo_data'
  destination = '/app/backend/data'

[env]
  NODE_ENV = 'production'
  PORT = '3001'
  GEMINI_MODEL = 'gemini-2.5-flash'
